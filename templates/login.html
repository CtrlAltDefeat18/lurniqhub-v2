{% extends "base.html" %}
{% block title %}Login - LurniqHub{% endblock %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary to-ocean py-12 px-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <span class="material-icons-round text-white text-6xl mb-4">sailing</span>
            <h1 class="text-4xl font-bold text-white mb-2">LurniqHub</h1>
            <p class="text-white/80">Navigate Your Future</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8 login-card">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Welcome Back</h2>
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Username</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-medium mb-2">Password</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition">
                </div>
                
                <button type="submit" 
                        class="w-full bg-primary hover:bg-ocean text-white font-bold py-3 rounded-lg transition transform hover:scale-105">
                    Login
                </button>
            </form>
            
            <p class="text-center text-gray-600 mt-6">
                Don't have an account? 
                <a href="{{ url_for('register') }}" class="text-primary font-bold hover:underline">Register</a>
            </p>
        </div>
    </div>
</div>

<script>
    // GSAP Animation
    gsap.from('.login-card', {
        duration: 0.8,
        y: 50,
        opacity: 0,
        ease: 'power3.out'
    });
</script>

{% endblock %}
