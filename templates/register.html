{% extends "base.html" %}
{% block title %}Register - LurniqHub{% endblock %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-secondary to-wave py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <span class="material-icons-round text-white text-6xl mb-4">anchor</span>
            <h1 class="text-4xl font-bold text-white mb-2">Join LurniqHub</h1>
            <p class="text-white/80">Start Your Maritime Journey</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-2xl p-8 register-card">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Create Account</h2>
            
            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Username</label>
                    <input type="text" name="username" required minlength="3"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition">
                    <p class="text-sm text-gray-500 mt-1">At least 3 characters</p>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-medium mb-2">Password</label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition">
                    <p class="text-sm text-gray-500 mt-1">At least 6 characters</p>
                </div>
                
                <button type="submit" 
                        class="w-full bg-secondary hover:bg-wave text-white font-bold py-3 rounded-lg transition transform hover:scale-105">
                    Register
                </button>
            </form>
            
            <p class="text-center text-gray-600 mt-6">
                Already have an account? 
                <a href="{{ url_for('login') }}" class="text-secondary font-bold hover:underline">Login</a>
            </p>
        </div>
    </div>
</div>

<script>
    gsap.from('.register-card', {
        duration: 0.8,
        y: 50,
        opacity: 0,
        ease: 'power3.out'
    });
</script>

{% endblock %}
